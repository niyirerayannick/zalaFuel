services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: zalaeco
      POSTGRES_USER: zalaeco
      POSTGRES_PASSWORD: zalaeco
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zalaeco -d zalaeco"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: nopra_fuel.settings.production
      DATABASE_URL: postgres://zalaeco:zalaeco@db:5432/zalaeco
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    restart: unless-stopped
    command: celery -A nopra_fuel worker -l info
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: nopra_fuel.settings.production
      DATABASE_URL: postgres://zalaeco:zalaeco@db:5432/zalaeco
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build: .
    restart: unless-stopped
    command: celery -A nopra_fuel beat -l info
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: nopra_fuel.settings.production
      DATABASE_URL: postgres://zalaeco:zalaeco@db:5432/zalaeco
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  static_data:
  media_data:
