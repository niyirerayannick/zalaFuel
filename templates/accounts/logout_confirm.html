{% extends "base.html" %}

{% block title %}Logout | {{ brand_name|default:"ZALA/ECO ENERGY" }}{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto mt-10 rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
    <h2 class="text-xl font-semibold text-slate-900">Confirm Logout</h2>
    <p class="mt-2 text-sm text-slate-600">Are you sure you want to logout from your account?</p>
    <form method="post" class="mt-6 flex items-center gap-3">
        {% csrf_token %}
        <button type="submit" class="rounded-lg bg-red-600 px-4 py-2 text-sm font-semibold text-white hover:bg-red-700">Logout</button>
        <a href="{% url 'accounts:dashboard' %}" class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100">Cancel</a>
    </form>
</div>
{% endblock %}
