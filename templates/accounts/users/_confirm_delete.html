<form id="user-modal-form" method="post" action="{{ action|default:request.path }}" class="bg-white rounded-2xl shadow">
    {% csrf_token %}
    <div id="user-form-error" class="hidden mx-6 mt-6 rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-700"></div>
    <div class="px-6 pt-6">
        <h2 class="text-xl font-semibold text-slate-900">Delete User</h2>
        <p class="mt-2 text-sm text-slate-600">
            Are you sure you want to delete <strong>{{ managed_user.full_name|default:managed_user.email }}</strong>?
            Users with operational records will be deactivated instead to preserve audit history.
        </p>
    </div>
    <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-slate-200 bg-slate-50">
        <button type="button" id="user-delete-cancel-btn" class="rounded-xl border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100">Cancel</button>
        <button type="submit" class="rounded-xl bg-rose-600 px-4 py-2 text-sm font-semibold text-white hover:bg-rose-700">Delete</button>
    </div>
</form>
