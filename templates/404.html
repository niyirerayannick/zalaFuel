{% extends "base.html" %}

{% block title %}Page Not Found | {{ brand_name|default:"ZALA/ECO ENERGY" }}{% endblock %}

{% block content %}
<div class="mx-auto flex min-h-[70vh] max-w-3xl items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
    <div class="w-full rounded-3xl border border-slate-200 bg-white p-8 text-center shadow-sm sm:p-10">
        <div class="mx-auto flex h-20 w-20 items-center justify-center rounded-full bg-slate-100">
            <span class="material-symbols-outlined text-4xl text-slate-700">error</span>
        </div>
        <p class="mt-6 text-xs font-semibold uppercase tracking-[0.22em] text-slate-500">Error 404</p>
        <h1 class="mt-3 text-3xl font-bold text-slate-900 sm:text-4xl">Page not found</h1>
        <p class="mx-auto mt-4 max-w-xl text-sm leading-6 text-slate-600 sm:text-base">
            The page you are looking for does not exist, may have been moved, or the link may be incorrect.
        </p>
        <div class="mt-8 flex flex-col items-center justify-center gap-3 sm:flex-row">
            <a href="/" class="inline-flex items-center justify-center rounded-xl bg-green-700 px-5 py-3 text-sm font-semibold text-white transition hover:bg-green-800">
                Go to Dashboard
            </a>
            <button type="button" onclick="window.history.back()" class="inline-flex items-center justify-center rounded-xl border border-slate-300 bg-white px-5 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">
                Go Back
            </button>
        </div>
    </div>
</div>
{% endblock %}
