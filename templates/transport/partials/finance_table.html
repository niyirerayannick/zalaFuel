<div class="bg-white shadow-sm rounded-xl border border-gray-200 overflow-hidden">
    <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between gap-3">
        <div>
            <h3 class="text-sm font-semibold text-gray-700">{{ table_title }}</h3>
            {% if table_subtitle %}
            <p class="mt-1 text-xs text-gray-500">{{ table_subtitle }}</p>
            {% endif %}
        </div>
        {% if table_count %}
        <span class="inline-flex items-center rounded-full bg-gray-100 px-3 py-1 text-xs font-medium text-gray-600">{{ table_count }}</span>
        {% endif %}
    </div>
    {% include table_partial %}
</div>
