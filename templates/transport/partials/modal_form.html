<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6" role="dialog" aria-modal="true">
    <button type="button" class="absolute inset-0 bg-slate-950/55 backdrop-blur-sm" onclick="closeAppModal()" aria-label="Close modal"></button>
    <div class="relative z-[101] flex max-h-[90vh] w-full {% if modal_width_class %}{{ modal_width_class }}{% else %}max-w-3xl{% endif %} flex-col overflow-hidden rounded-[30px] border border-white/70 bg-[linear-gradient(180deg,rgba(240,253,244,0.85)_0%,rgba(255,255,255,0.98)_18%,rgba(255,255,255,1)_100%)] shadow-[0_24px_80px_rgba(15,23,42,0.18)] animate-[fadeIn_.2s_ease-out,scaleIn_.2s_ease-out]">
        <div class="flex items-start justify-between gap-4 border-b border-slate-200/80 px-8 py-7">
            <div class="flex items-start gap-4">
                <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl bg-gradient-to-br from-green-500 to-emerald-600 text-white shadow-[0_12px_30px_rgba(22,163,74,0.28)]">
                    <span class="material-symbols-outlined text-[22px] leading-none">{{ modal_icon|default:"account_balance" }}</span>
                </div>
                <div>
                    <p class="text-xs font-semibold uppercase tracking-[0.18em] text-green-700">{{ modal_eyebrow|default:"Finance" }}</p>
                    <h2 class="mt-1 text-[1.9rem] font-bold leading-tight text-slate-900">{{ modal_title }}</h2>
                {% if modal_subtitle %}
                    <p class="mt-2 max-w-2xl text-sm leading-6 text-slate-500">{{ modal_subtitle }}</p>
                {% endif %}
                </div>
            </div>
            <button type="button" onclick="closeAppModal()" class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-slate-200 bg-white/90 text-slate-500 transition duration-200 hover:border-slate-300 hover:bg-white hover:text-slate-700" aria-label="Close modal">
                <span class="material-symbols-outlined text-[20px] leading-none">close</span>
            </button>
        </div>

        <div class="overflow-y-auto px-8 py-8">
            <form
                method="post"
                action="{{ form_action }}"
                hx-post="{{ form_action }}"
                hx-target="#modal-container"
                hx-swap="innerHTML"
                class="space-y-8"
            >
                {% csrf_token %}

                {% if form.non_field_errors %}
                <div class="rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700 shadow-sm">
                    {{ form.non_field_errors }}
                </div>
                {% endif %}

                {% include form_partial %}

                <div class="flex flex-col-reverse gap-3 border-t border-slate-200/80 pt-6 sm:flex-row sm:justify-end">
                    <button type="button" onclick="closeAppModal()" class="inline-flex items-center justify-center rounded-2xl border border-slate-300 bg-white px-5 py-3 text-sm font-medium text-slate-700 transition duration-200 hover:bg-slate-50">
                        Cancel
                    </button>
                    <button type="submit" class="inline-flex items-center justify-center gap-2 rounded-2xl bg-gradient-to-r from-green-600 to-emerald-600 px-6 py-3 text-sm font-semibold text-white shadow-[0_12px_28px_rgba(22,163,74,0.28)] transition duration-200 hover:-translate-y-0.5 hover:from-green-700 hover:to-emerald-700">
                        <span class="material-symbols-outlined text-[18px] leading-none">{{ submit_icon|default:"save" }}</span>
                        {{ submit_label }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
