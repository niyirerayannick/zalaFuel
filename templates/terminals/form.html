{% extends "base.html" %}
{% block title %}{{ title|default:"Add Terminal" }} | {{ brand_name|default:"ZALA Terminal" }}{% endblock %}
{% block content %}
<div class="mx-auto max-w-3xl rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
    <h1 class="text-2xl font-bold text-slate-900">{{ title|default:"Add Terminal" }}</h1>
    <form method="post" class="mt-6">
        {% csrf_token %}
        {% include "terminals/_form_fields.html" %}
        <div class="mt-6">
            <button type="submit" class="rounded-lg bg-green-700 px-4 py-2.5 text-sm font-semibold text-white hover:bg-green-800">Save Terminal</button>
        </div>
    </form>
</div>
{% endblock %}
