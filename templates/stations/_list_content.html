<div class="overflow-x-auto">
  <table class="min-w-full divide-y divide-slate-200">
    <thead class="bg-slate-50">
      <tr>
        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600 uppercase">Name</th>
        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600 uppercase">Code</th>
        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600 uppercase">Location</th>
        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600 uppercase">Manager</th>
        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600 uppercase">Status</th>
        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600 uppercase">Actions</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-slate-100 bg-white">
      {% for station in stations %}
      <tr>
        <td class="px-4 py-3 text-sm text-slate-800">{{ station.name }}</td>
        <td class="px-4 py-3 text-sm text-slate-800">{{ station.code }}</td>
        <td class="px-4 py-3 text-sm text-slate-600">{{ station.location }}</td>
        <td class="px-4 py-3 text-sm text-slate-600">{{ station.manager.full_name|default:"-" }}</td>
        <td class="px-4 py-3 text-sm">
          {% if station.is_active %}
          <span class="inline-flex items-center gap-2 rounded-full bg-emerald-50 px-3 py-1 text-xs font-semibold text-emerald-700">Active</span>
          {% else %}
          <span class="inline-flex items-center gap-2 rounded-full bg-rose-50 px-3 py-1 text-xs font-semibold text-rose-700">Inactive</span>
          {% endif %}
        </td>
        <td class="px-4 py-3 text-sm text-slate-600">
          <div class="flex gap-2">
            <button data-edit-url="{% url 'stations:update' station.pk %}" class="station-edit-btn rounded-lg border border-slate-200 px-3 py-1.5 text-xs font-semibold text-slate-700 hover:bg-slate-50">Edit</button>
            <button data-delete-url="{% url 'stations:delete' station.pk %}" class="station-delete-btn rounded-lg border border-rose-200 px-3 py-1.5 text-xs font-semibold text-rose-700 hover:bg-rose-50">Delete</button>
          </div>
        </td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="6" class="px-4 py-6 text-center text-sm text-slate-500">No stations found.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
