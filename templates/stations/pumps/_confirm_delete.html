<form method="post" class="bg-white rounded-2xl shadow">
  {% csrf_token %}
  <div class="px-6 pt-6">
    <h2 class="text-xl font-semibold text-slate-900">Delete Station</h2>
    <p class="mt-2 text-sm text-slate-600">Are you sure you want to delete <strong>{{ station.name }}</strong>? This action cannot be undone.</p>
  </div>
  <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-slate-200 bg-slate-50">
    <button type="button" onclick="closeModal()" class="rounded-xl border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100">Cancel</button>
    <button type="submit" class="rounded-xl bg-rose-600 px-4 py-2 text-sm font-semibold text-white hover:bg-rose-700">Delete</button>
  </div>
</form>
