<form method="get" class="flex w-full flex-wrap gap-2">
    <select name="station" class="rounded-xl border border-slate-200 px-3 py-2 text-sm focus:border-[#0f7ea6] focus:ring-1 focus:ring-[#0f7ea6]">
        <option value="">All stations</option>
        {% for st in stations %}
        <option value="{{ st.id }}" {% if filters.station == st.id|stringformat:'s' %}selected{% endif %}>{{ st.name }}</option>
        {% endfor %}
    </select>
    <select name="payment_method" class="rounded-xl border border-slate-200 px-3 py-2 text-sm focus:border-[#0f7ea6] focus:ring-1 focus:ring-[#0f7ea6]">
        <option value="">All payments</option>
        {% for val,label in form_payment_methods %}
        <option value="{{ val }}" {% if filters.payment_method == val %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
    <select name="shift" class="rounded-xl border border-slate-200 px-3 py-2 text-sm focus:border-[#0f7ea6] focus:ring-1 focus:ring-[#0f7ea6]">
        <option value="">All shifts</option>
        {% for s in shifts %}
        <option value="{{ s.id }}" {% if filters.shift == s.id|stringformat:'s' %}selected{% endif %}>#{{ s.id }} - {{ s.station.name }}</option>
        {% endfor %}
    </select>
    <input type="date" name="date_from" value="{{ filters.date_from }}" class="rounded-xl border border-slate-200 px-3 py-2 text-sm focus:border-[#0f7ea6] focus:ring-1 focus:ring-[#0f7ea6]" />
    <input type="date" name="date_to" value="{{ filters.date_to }}" class="rounded-xl border border-slate-200 px-3 py-2 text-sm focus:border-[#0f7ea6] focus:ring-1 focus:ring-[#0f7ea6]" />
    <input type="text" name="search" value="{{ filters.search }}" placeholder="Search receipt or customer" class="flex-1 min-w-[220px] rounded-xl border border-slate-200 px-3 py-2 text-sm focus:border-[#0f7ea6] focus:ring-1 focus:ring-[#0f7ea6]" />
    <button class="rounded-xl border border-slate-200 px-3 py-2 text-sm font-medium text-slate-700 bg-white hover:bg-slate-50">Filter</button>
</form>
