{% if suspended_sales %}
<div class="space-y-2 text-sm">
    {% for sale in suspended_sales %}
    <div class="flex items-center justify-between rounded-lg border border-amber-200 bg-amber-50 px-3 py-2">
        <div>
            <p class="font-semibold text-amber-800">Suspended #{{ sale.id }}</p>
            <p class="text-amber-700">Pump {{ sale.pump }} • {{ sale.volume_liters }} L</p>
        </div>
        <div class="flex gap-2">
            <button class="rounded-lg bg-[#0f7ea6] px-3 py-1.5 text-xs font-semibold text-white">Resume</button>
            <button class="rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-semibold text-slate-700">Void</button>
        </div>
    </div>
    {% endfor %}
    </div>
{% else %}
    <p class="text-sm text-slate-500">No suspended or pending sales.</p>
{% endif %}
